<!DOCTYPE html>
<html lang="en">
<head>
<title>PaulMauriat-generator</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Image generator like Paul Mauriat.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="container">

    <header>
      <h1><a href="">PaulMauriat-generator</a></h1>
    </header>

    <main class="app-main">
    <div id="wrapper"></div>

    <div
      id="image-select-view"
      class="view disp-none"
      role="button"
      tabindex="0"
      aria-label="Select or drop a background image"
    >
      <div id="guide">
        <p>Click here to select an image or Drop an image here.</p>
      </div>
    </div>

    <p id="status-message" class="status-message" role="status" aria-live="polite" lang="ja"></p>

    <output
      id="face-debug-status"
      class="face-debug-status"
      aria-label="Face tracking debug status"
      hidden
      lang="ja"
    ></output>

    <div class="buttons hidden" role="toolbar" aria-label="Image controls">
      <div id="reselect-button">
        <input id="read-file" type="file" accept="image/*" class="disp-none">
        <button id="reselect" type="button" class="action-button" aria-label="Reselect background image">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <circle cx="9" cy="10" r="2"></circle>
            <path d="M5 17l4-4 3 3 3-4 4 5"></path>
          </svg>
          <span class="button-label" aria-hidden="true">画像</span>
        </button>
      </div>
      <button id="start" type="button" class="action-button" aria-label="Start face tracking">
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path class="icon-fill" d="M8 5l11 7-11 7z"></path>
        </svg>
        <span class="button-label" aria-hidden="true">開始</span>
      </button>
      <button id="stop" type="button" class="action-button" aria-label="Stop face tracking">
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect class="icon-fill" x="6" y="6" width="12" height="12" rx="1"></rect>
        </svg>
        <span class="button-label" aria-hidden="true">停止</span>
      </button>
      <button id="share" type="button" class="action-button action-button--primary" aria-label="Share generated image" disabled>
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 15V3M7 8l5-5 5 5"></path>
          <path d="M5 13v7h14v-7"></path>
        </svg>
        <span class="button-label" aria-hidden="true">共有</span>
      </button>
      <button id="capture" type="button" class="action-button" aria-label="Download generated image" disabled>
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 3v12M7 10l5 5 5-5M5 20h14"></path>
        </svg>
        <span class="button-label" aria-hidden="true">保存</span>
      </button>
      <button id="switch-camera" type="button" class="action-button" aria-label="Switch camera">
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19 8a8 8 0 0 0-13-2L4 8"></path>
          <path d="M4 4v4h4M5 16a8 8 0 0 0 13 2l2-2"></path>
          <path d="M20 20v-4h-4"></path>
        </svg>
        <span class="button-label" aria-hidden="true">切替</span>
      </button>
    </div>

    <div class="face-style-wrapper hidden">
      <div class="face-style">
        <label class="control-field">
          <span class="control-label">位置</span>
          <select id="face-position-list" name="face-position-list" aria-label="Face position">
            <option value="1" selected>Top, Right</option>
            <option value="2">Top, Left</option>
            <option value="3">Bottom, Right</option>
            <option value="4">Bottom, Left</option>
            <option value="custom">Custom</option>
          </select>
          <span id="face-position-hint" class="control-hint">顔をドラッグして移動</span>
        </label>
        <label class="control-field control-field--range">
          <span class="control-label">透明度</span>
          <span class="range-row">
            <input id="face-alpha-range" type="range" step=".01" min="0.3" max="1" value="" aria-label="Face opacity">
            <output class="face-alpha-val" for="face-alpha-range"></output>
          </span>
        </label>
        <label class="control-field">
          <span class="control-label">目元</span>
          <select id="face-privacy" name="face-privacy" aria-label="Face privacy filter">
            <option value="0" selected>none</option>
            <option value="1">eyeline</option>
            <option value="2">mosaic</option>
          </select>
        </label>
      </div>
    </div>
    </main>

    <div id="overlay" aria-hidden="true"></div>

  </div>

  <script src="js/vendor/clmtrackr/clmtrackr.min.js"></script>
  <script src="js/face-tracker.js"></script>
  <script src="js/v2c.js"></script>
  <script src="js/image-orientation.js"></script>
  <script src="js/privacy-filter.js"></script>
  <script src="js/canvas-quality.js"></script>
  <script src="js/face-placement.js"></script>
  <script src="js/face-geometry.js"></script>
  <script src="js/face-renderer.js"></script>
  <script src="js/image-input.js"></script>
  <script src="js/image-dimensions.js"></script>
  <script src="js/image-loader.js"></script>
  <script src="js/camera-error.js"></script>
  <script src="js/preview-layout.js"></script>
  <script src="js/image-exporter.js"></script>
  <script src="js/image-share.js"></script>
  <script src="js/face-debug.js"></script>
  <script src="js/generator.js"></script>
</body>
</html>
