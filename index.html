<!DOCTYPE html>
<html lang="en">
<head>
<title>PaulMauriat-generator</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Image generator like Paul Mauriat.">
<link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="container">

    <header>
      <h1><a href="">PaulMauriat-generator</a></h1>
    </header>

    <div id="wrapper"></div>

    <div
      id="image-select-view"
      class="view disp-none"
      role="button"
      tabindex="0"
      aria-label="Select or drop a background image"
    >
      <div id="guide">
        <p>Click here to select an image or Drop an image here.</p>
      </div>
    </div>

    <p id="status-message" class="status-message" role="status" aria-live="polite" lang="ja"></p>

    <div class="buttons hidden">
      <div id="reselect-button" title="reselect image">
        <input id="read-file" type="file" accept="image/*" class="disp-none">
        <button id="reselect" type="button" aria-label="Reselect background image">
          <i class="far fa-file-image fa-3x" aria-hidden="true"></i>
        </button>
      </div>
      <button id="start" type="button" title="start" aria-label="Start face tracking">
        <i class="far fa-play-circle fa-3x" aria-hidden="true"></i>
      </button>
      <button id="stop" type="button" title="stop" aria-label="Stop face tracking">
        <i class="far fa-stop-circle fa-3x" aria-hidden="true"></i>
      </button>
      <button id="capture" type="button" title="capture" aria-label="Download generated image">
        <i class="fas fa-file-download fa-3x" aria-hidden="true"></i>
      </button>
      <button id="switch-camera" type="button" title="switch camera" aria-label="Switch camera">
        <span class="fa-stack" aria-hidden="true">
          <i class="fas fa-sync-alt fa-stack-2x"></i>
          <i class="fas fa-camera fa-stack-1x"></i>
        </span>
      </button>
    </div>

    <div class="face-style-wrapper hidden">
      <div class="face-icon">
        <i class="far fa-smile fa-fw" aria-hidden="true"></i>
      </div>
      <div class="face-style">
        <select id="face-position-list" name="face-position-list" aria-label="Face position">
          <option value="1" selected>Top, Right</option>
          <option value="2">Top, Left</option>
          <option value="3">Bottom, Right</option>
          <option value="4">Bottom, Left</option>
        </select>
        <input id="face-alpha-range" type="range" step=".01" min="0.3" max="1" value="" aria-label="Face opacity">
        <output class="face-alpha-val" for="face-alpha-range"></output>
        <i class="fas fa-user-secret privacy-icon" aria-hidden="true"></i>
        <select id="face-privacy" name="face-privacy" aria-label="Face privacy filter">
          <option value="0" selected>none</option>
          <option value="1">eyeline</option>
          <option value="2">mosaic</option>
        </select>
      </div>
    </div>

    <div id="overlay"></div>

  </div>

  <script src="js/vendor/clmtrackr/clmtrackr.min.js"></script>
  <script src="js/v2c.js"></script>
  <script src="js/image-orientation.js"></script>
  <script src="js/privacy-filter.js"></script>
  <script src="js/face-placement.js"></script>
  <script src="js/image-input.js"></script>
  <script src="js/image-dimensions.js"></script>
  <script src="js/image-loader.js"></script>
  <script src="js/camera-error.js"></script>
  <script src="js/preview-layout.js"></script>
  <script src="js/generator.js"></script>
</body>
</html>
