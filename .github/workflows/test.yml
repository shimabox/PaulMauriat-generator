name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: Node.jsを準備
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: 依存パッケージを準備
        run: npm ci

      - name: テストを実行
        run: npm test

      - name: JavaScriptの構文を確認
        run: npm run test:syntax

      - name: Chromiumを準備
        run: npx playwright install --with-deps chromium

      - name: ブラウザテストを実行
        run: npm run test:e2e
